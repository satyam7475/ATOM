<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">ATOM v15 Voice and Brain Pipeline</title>
  <desc id="desc">Flow from microphone through STT, event bus, router, local LLM, to TTS and speaker</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="900" height="420" fill="url(#bg)"/>
  <text x="450" y="36" fill="#58a6ff" font-size="22" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-weight="600" text-anchor="middle">ATOM v15  Voice to Voice (Local Brain)</text>
  <text x="450" y="58" fill="#8b949e" font-size="12" font-family="Segoe UI,Helvetica,Arial,sans-serif" text-anchor="middle">Personal Cognitive OS · Satyam · Offline LLM + Intent Engine</text>

  <g font-family="Segoe UI,Helvetica,Arial,sans-serif" filter="url(#shadow)">
    <rect x="40" y="100" width="100" height="48" rx="8" fill="#21262d" stroke="#30363d"/>
    <text x="90" y="130" fill="#c9d1d9" font-size="13" text-anchor="middle">Mic</text>

    <path d="M 140 124 L 175 124" stroke="#58a6ff" stroke-width="2" fill="none"/>
    <polygon points="175,124 168,120 168,128" fill="#58a6ff"/>

    <rect x="180" y="100" width="110" height="48" rx="8" fill="#238636" stroke="#3fb950"/>
    <text x="235" y="122" fill="#fff" font-size="12" text-anchor="middle">Vosk STT</text>
    <text x="235" y="138" fill="#aff5b4" font-size="10" text-anchor="middle">offline</text>

    <path d="M 290 124 L 325 124" stroke="#58a6ff" stroke-width="2"/>
    <polygon points="325,124 318,120 318,128" fill="#58a6ff"/>

    <rect x="330" y="88" width="200" height="76" rx="8" fill="#21262d" stroke="#a371f7"/>
    <text x="430" y="112" fill="#d2a8ff" font-size="13" text-anchor="middle">AsyncEventBus</text>
    <text x="430" y="130" fill="#8b949e" font-size="11" text-anchor="middle">speech_final ’ router</text>
    <text x="430" y="148" fill="#8b949e" font-size="11" text-anchor="middle">cursor_query · partial_response</text>

    <path d="M 530 124 L 555 124" stroke="#58a6ff" stroke-width="2"/>
    <polygon points="555,124 548,120 548,128" fill="#58a6ff"/>

    <rect x="560" y="88" width="130" height="76" rx="8" fill="#21262d" stroke="#f0883e"/>
    <text x="625" y="112" fill="#ffa657" font-size="13" text-anchor="middle">Router</text>
    <text x="625" y="130" fill="#8b949e" font-size="10" text-anchor="middle">Intent · Cache · Memory</text>
    <text x="625" y="148" fill="#8b949e" font-size="10" text-anchor="middle">SecurityPolicy</text>

    <path d="M 625 164 L 625 188" stroke="#58a6ff" stroke-width="2"/>
    <polygon points="625,188 621,181 629,181" fill="#58a6ff"/>

    <rect x="545" y="192" width="160" height="56" rx="8" fill="#1f6feb" stroke="#388bfd"/>
    <text x="625" y="216" fill="#fff" font-size="12" text-anchor="middle">LocalBrainController</text>
    <text x="625" y="234" fill="#c9d1d9" font-size="10" text-anchor="middle">MiniLLM · Llama 3.2 3B GGUF</text>

    <path d="M 625 248 L 625 272" stroke="#58a6ff" stroke-width="2"/>
    <polygon points="625,272 621,265 629,265" fill="#58a6ff"/>

    <rect x="555" y="276" width="150" height="48" rx="8" fill="#21262d" stroke="#db61a2"/>
    <text x="630" y="298" fill="#ff7b72" font-size="12" text-anchor="middle">Edge TTS / SAPI</text>
    <text x="630" y="314" fill="#8b949e" font-size="10" text-anchor="middle">response ’ audio</text>

    <path d="M 705 300 L 750 300" stroke="#58a6ff" stroke-width="2"/>
    <polygon points="750,300 743,296 743,304" fill="#58a6ff"/>

    <rect x="755" y="276" width="100" height="48" rx="8" fill="#21262d" stroke="#30363d"/>
    <text x="805" y="306" fill="#c9d1d9" font-size="13" text-anchor="middle">Speaker</text>

    <rect x="40" y="200" width="200" height="100" rx="8" fill="#161b22" stroke="#30363d" stroke-dasharray="4 3"/>
    <text x="140" y="228" fill="#79c0ff" font-size="12" text-anchor="middle">Cognitive Layer</text>
    <text x="140" y="248" fill="#8b949e" font-size="10" text-anchor="middle">Goals · Predictions</text>
    <text x="140" y="264" fill="#8b949e" font-size="10" text-anchor="middle">SecondBrain · Modes</text>
    <text x="140" y="284" fill="#6e7681" font-size="9" text-anchor="middle">parallel · event-driven</text>
  </g>

  <text x="450" y="400" fill="#484f58" font-size="11" font-family="Segoe UI,sans-serif" text-anchor="middle">Bottleneck on open chat: Local LLM (~1530s CPU) · Commands: STT + TTS dominate</text>
</svg>
